name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Package mod
        shell: bash
        run: |
          set -euo pipefail
          rm -rf package release
          mkdir -p package/TrueClock release
          cp -R bin/Release/net6.0/. package/TrueClock/
          rm -f package/TrueClock/*.pdb
          cd package
          zip -r ../release/TrueClock.zip TrueClock

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrueClock
          path: release/TrueClock.zip

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/TrueClock.zip
